name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - hugo-source  # Trigger on pushes to your source branch

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.156.0
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build with Hugo
        env:
          # For maximum compatibility with the Hugo modules
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --gc \
            --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: main  # Deploying to main as per user's existing setup

      - name: Notify subscribers of new ECG posts
        if: success()
        env:
          NOTIFY_API_URL: https://asia-east1-agoodbear-website.cloudfunctions.net/writeStudioApi/write-studio-api/notify-new-posts
          WRITE_STUDIO_TOKEN: ${{ secrets.WRITE_STUDIO_TOKEN }}
        run: |
          ECG_POSTS=$(node scripts/collect-ecg-posts.js)
          POST_COUNT=$(echo "$ECG_POSTS" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');console.log(JSON.parse(d).length)")
          echo "Found $POST_COUNT ECG posts"
          if [ "$POST_COUNT" -gt 0 ]; then
            curl -sf -X POST "$NOTIFY_API_URL" \
              -H "Content-Type: application/json" \
              -H "X-Write-Studio-Token: $WRITE_STUDIO_TOKEN" \
              -d "{\"posts\": $ECG_POSTS}" \
              --max-time 30 || echo "::warning::Notification API call failed (non-blocking)"
          fi

      - name: Resubmit sitemap to Google Search Console
        if: success()
        env:
          GCLOUD_ADC_JSON: ${{ secrets.GCLOUD_ADC_JSON }}
        run: |
          echo "$GCLOUD_ADC_JSON" > /tmp/gcloud-adc.json
          # Get access token using refresh token
          ACCESS_TOKEN=$(curl -sf -X POST "https://oauth2.googleapis.com/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=$(echo "$GCLOUD_ADC_JSON" | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).client_id)")" \
            -d "client_secret=$(echo "$GCLOUD_ADC_JSON" | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).client_secret)")" \
            -d "refresh_token=$(echo "$GCLOUD_ADC_JSON" | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).refresh_token)")" \
            -d "grant_type=refresh_token" | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).access_token)")
          
          if [ -n "$ACCESS_TOKEN" ]; then
            # Resubmit sitemap
            curl -sf -X PUT \
              "https://searchconsole.googleapis.com/webmasters/v3/sites/https%3A%2F%2Fagoodbear.github.io%2F/sitemaps/https%3A%2F%2Fagoodbear.github.io%2Fsitemap.xml" \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "x-goog-user-project: gen-lang-client-0217249336" \
              -H "Content-Type: application/json" \
              --max-time 15 && echo "✅ Sitemap resubmitted" || echo "::warning::Sitemap resubmit failed (non-blocking)"
          else
            echo "::warning::Failed to get access token for Search Console"
          fi
          rm -f /tmp/gcloud-adc.json
