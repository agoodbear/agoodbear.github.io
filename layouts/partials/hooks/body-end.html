<style>
  :root {
    --ecg-rp-left: 12px;
    --ecg-rp-width: 280px;
  }

  .ecg-rp-shell {
    position: fixed;
    top: 72px;
    left: var(--ecg-rp-left);
    width: var(--ecg-rp-width);
    max-width: calc(100vw - 20px);
    z-index: 60;
    padding: 8px 10px 9px;
    border-radius: 10px;
    border: 1px solid rgba(17, 100, 90, 0.18);
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 20px rgba(8, 49, 45, 0.08);
  }

  .ecg-rp-shell[hidden] {
    display: none !important;
  }

  .ecg-rp-shell[data-compact="true"] {
    padding: 6px 7px;
    border-radius: 8px;
  }

  .ecg-rp-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .ecg-rp-shell[data-compact="true"] .ecg-rp-meta {
    margin-bottom: 4px;
    justify-content: flex-end;
  }

  .ecg-rp-label {
    font-size: 0.7rem;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: #456862;
  }

  .ecg-rp-shell[data-compact="true"] .ecg-rp-label {
    display: none;
  }

  .ecg-rp-percent {
    font-size: 0.73rem;
    color: #183f3b;
  }

  .ecg-rp-shell[data-compact="true"] .ecg-rp-percent {
    font-size: 0.68rem;
  }

  .ecg-rp-svg {
    width: 100%;
    display: block;
  }

  .ecg-rp-base {
    fill: none;
    stroke: #c2cfcc;
    stroke-width: 20.8;
    opacity: 0.56;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .ecg-rp-active {
    fill: none;
    stroke: rgb(15, 95, 87);
    stroke-width: 18.4;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 0 10px rgba(32, 163, 147, 0.38));
    transition: stroke 220ms ease, filter 220ms ease;
  }

  .ecg-rp-shell[data-compact="true"] .ecg-rp-base {
    stroke-width: 19.2;
  }

  .ecg-rp-shell[data-compact="true"] .ecg-rp-active {
    stroke-width: 16;
  }

  .ecg-rp-tip {
    position: absolute;
    top: calc(100% + 8px);
    left: 10px;
    max-width: 240px;
    font-size: 0.72rem;
    color: #f3fbf9;
    background: rgba(10, 62, 57, 0.92);
    padding: 6px 9px;
    border-radius: 7px;
    opacity: 0;
    transform: translateY(-4px);
    pointer-events: none;
    transition: opacity 180ms ease, transform 180ms ease;
    box-shadow: 0 8px 20px rgba(3, 24, 21, 0.22);
  }

  .ecg-rp-tip::before {
    content: "";
    position: absolute;
    width: 10px;
    height: 10px;
    top: -5px;
    left: 16px;
    background: inherit;
    transform: rotate(45deg);
  }

  .ecg-rp-shell:hover .ecg-rp-tip,
  .ecg-rp-shell:focus-within .ecg-rp-tip {
    opacity: 1;
    transform: translateY(0);
  }

  .ecg-rp-shell[data-compact="true"] .ecg-rp-tip {
    display: none;
  }

  .ecg-rp-shell:focus-within {
    outline: 2px solid rgba(17, 118, 107, 0.34);
    outline-offset: 2px;
  }

  @media (min-width: 1200px) {
    body.ecg-rp-lane .post_content {
      padding-left: 124px;
    }
  }

  @media (max-width: 900px) {
    .ecg-rp-shell {
      display: none !important;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .ecg-rp-active,
    .ecg-rp-tip {
      transition: none;
    }
  }
</style>

<div class="ecg-rp-shell" id="ecgReadProgress" role="status" aria-label="Reading progress ECG" tabindex="0" hidden>
  <div class="ecg-rp-meta">
    <span class="ecg-rp-label">ECG Reading Progress</span>
    <span class="ecg-rp-percent" id="ecgReadPercent">0%</span>
  </div>
  <svg class="ecg-rp-svg" viewBox="0 0 1000 220" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
    <path
      class="ecg-rp-base"
      d="M20 110 L260 110 C278 110 289 62 304 62 C318 62 330 110 346 110 L394 110 L415 130 L438 10 L462 198 L490 110 L596 110 C624 110 650 38 688 38 C726 38 754 110 782 110 L980 110"
    />
    <path
      class="ecg-rp-active"
      id="ecgReadActivePath"
      d="M20 110 L260 110 C278 110 289 62 304 62 C318 62 330 110 346 110 L394 110 L415 130 L438 10 L462 198 L490 110 L596 110 C624 110 650 38 688 38 C726 38 754 110 782 110 L980 110"
    />
  </svg>
  <div class="ecg-rp-tip" id="ecgReadTip">Reading progress</div>
</div>

<script>
  (function () {
    const isSinglePage = document.documentElement.classList.contains("page");
    const isPostPath = window.location.pathname.includes("/post/");
    if (!isSinglePage || !isPostPath) return;

    const shell = document.getElementById("ecgReadProgress");
    const article = document.querySelector(".post_content");
    const articleBody = document.querySelector(".post_content .post_body");
    const path = document.getElementById("ecgReadActivePath");
    const percent = document.getElementById("ecgReadPercent");
    const tip = document.getElementById("ecgReadTip");

    if (!shell || !article || !articleBody || !path || !percent || !tip) return;

    const readPhases = [
      { readEnd: 0.2, pathEnd: 0.34, tip: "Reading progress" },
      { readEnd: 0.35, pathEnd: 0.46, tip: "P wave shaping..." },
      { readEnd: 0.62, pathEnd: 0.67, tip: "Clinical reasoning loading..." },
      { readEnd: 0.81, pathEnd: 0.82, tip: "ST segment extending..." },
      { readEnd: 1, pathEnd: 1, tip: "Reading progress" }
    ];

    const clamp01 = (n) => Math.max(0, Math.min(1, n));
    const totalLength = path.getTotalLength();
    path.style.strokeDasharray = `${totalLength}`;
    path.style.strokeDashoffset = `${totalLength}`;

    const placeInLeftGutter = () => {
      const margin = 12;
      const articleRect = article.getBoundingClientRect();
      const preferredWidth = 220;
      const leftGutter = articleRect.left - margin;
      const available = leftGutter - margin;

      if (available < 92) {
        if (window.innerWidth >= 1200) {
          const laneWidth = Math.round(Math.max(92, Math.min(124, window.innerWidth * 0.09)));
          document.body.classList.add("ecg-rp-lane");
          document.documentElement.style.setProperty("--ecg-rp-left", `${margin}px`);
          document.documentElement.style.setProperty("--ecg-rp-width", `${laneWidth}px`);
          shell.dataset.compact = laneWidth < 150 ? "true" : "false";
          shell.hidden = false;
          return true;
        }

        document.body.classList.remove("ecg-rp-lane");
        shell.hidden = true;
        return false;
      }

      const width = Math.max(92, Math.min(preferredWidth, available));
      const left = Math.round(articleRect.left - width - margin);
      document.body.classList.remove("ecg-rp-lane");
      document.documentElement.style.setProperty("--ecg-rp-left", `${left}px`);
      document.documentElement.style.setProperty("--ecg-rp-width", `${Math.round(width)}px`);
      shell.dataset.compact = width < 150 ? "true" : "false";
      shell.hidden = false;
      return true;
    };

    const getReadProgress = () => {
      const top = articleBody.offsetTop;
      const bottom = top + articleBody.offsetHeight;
      const viewportBottom = window.scrollY + window.innerHeight;
      const scrollable = bottom - top;

      if (scrollable <= 0) return 1;
      return clamp01((viewportBottom - top) / scrollable);
    };

    const mapReadToPath = (readProgress) => {
      let prevRead = 0;
      let prevPath = 0;
      let currentTip = readPhases[0].tip;

      for (const phase of readPhases) {
        if (readProgress <= phase.readEnd) {
          const span = phase.readEnd - prevRead || 1;
          const local = clamp01((readProgress - prevRead) / span);
          return {
            pathProgress: prevPath + local * (phase.pathEnd - prevPath),
            currentTip: phase.tip
          };
        }
        prevRead = phase.readEnd;
        prevPath = phase.pathEnd;
        currentTip = phase.tip;
      }

      return { pathProgress: 1, currentTip };
    };

    const toRgb = (start, end, p) => Math.round(start + (end - start) * p);

    let ticking = false;
    const update = () => {
      const visible = placeInLeftGutter();
      if (!visible) {
        ticking = false;
        return;
      }

      const readProgress = getReadProgress();
      const { pathProgress, currentTip } = mapReadToPath(readProgress);
      const drawLength = totalLength * clamp01(pathProgress);
      const progressPct = Math.round(readProgress * 100);

      const rgb = [toRgb(15, 15, readProgress), toRgb(95, 167, readProgress), toRgb(87, 154, readProgress)];
      path.style.strokeDashoffset = `${totalLength - drawLength}`;
      path.style.stroke = `rgb(${rgb.join(",")})`;
      path.style.filter = `drop-shadow(0 0 6px rgba(${rgb.join(",")}, 0.26))`;
      percent.textContent = `${progressPct}%`;
      tip.textContent = readProgress >= 1 ? "Reading progress · 100% complete" : `${currentTip} ${progressPct}%`;
      ticking = false;
    };

    const requestUpdate = () => {
      if (!ticking) {
        ticking = true;
        window.requestAnimationFrame(update);
      }
    };

    window.addEventListener("load", requestUpdate);
    window.addEventListener("resize", requestUpdate);
    window.addEventListener("scroll", requestUpdate, { passive: true });
    requestUpdate();
  })();
</script>

<script>
  (function () {
    const triggers = Array.from(document.querySelectorAll("[data-pdf-footnote-trigger]"));
    if (!triggers.length) return;

    let modal = null;
    let activeTrigger = null;

    function ensureModal() {
      if (modal) {
        return modal;
      }

      const root = document.createElement("div");
      root.className = "pdf-footnote-modal";
      root.id = "pdfFootnoteModal";
      root.innerHTML =
        '<div class="pdf-footnote-modal__backdrop" data-pdf-footnote-close></div>' +
        '<div class="pdf-footnote-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="pdfFootnoteModalTitle">' +
          '<div class="pdf-footnote-modal__chrome">' +
            '<div class="pdf-footnote-modal__header">' +
              '<div>' +
                '<p class="pdf-footnote-modal__eyebrow">PDF Footnote</p>' +
                '<h3 class="pdf-footnote-modal__title" id="pdfFootnoteModalTitle"></h3>' +
                '<div class="pdf-footnote-modal__meta">' +
                  '<span class="pdf-footnote-modal__page-label"></span>' +
                  '<a class="pdf-footnote-modal__link" id="pdfFootnoteModalFullReader" target="_blank" rel="noopener">Open Reader</a>' +
                  '<a class="pdf-footnote-modal__link" id="pdfFootnoteModalSource" target="_blank" rel="noopener">Open PDF</a>' +
                '</div>' +
              '</div>' +
              '<button type="button" class="pdf-footnote-modal__close" aria-label="Close popup" data-pdf-footnote-close>&times;</button>' +
            '</div>' +
            '<div class="pdf-footnote-modal__frame-wrap">' +
              '<div class="pdf-footnote-modal__loading">Loading reader...</div>' +
              '<iframe class="pdf-footnote-modal__frame" title="PDF footnote reader" loading="lazy"></iframe>' +
            '</div>' +
          '</div>' +
        '</div>';

      document.body.appendChild(root);

      modal = {
        root: root,
        title: root.querySelector(".pdf-footnote-modal__title"),
        page: root.querySelector(".pdf-footnote-modal__page-label"),
        source: root.querySelector("#pdfFootnoteModalSource"),
        fullReader: root.querySelector("#pdfFootnoteModalFullReader"),
        loading: root.querySelector(".pdf-footnote-modal__loading"),
        frame: root.querySelector(".pdf-footnote-modal__frame"),
      };

      root.addEventListener("click", (event) => {
        if (event.target.closest("[data-pdf-footnote-close]")) {
          closeModal();
        }
      });

      modal.frame.addEventListener("load", () => {
        modal.loading.hidden = true;
      });

      return modal;
    }

    function handleEscape(event) {
      if (event.key === "Escape") {
        closeModal();
      }
    }

    function closeModal() {
      if (!modal || !modal.root.classList.contains("is-open")) {
        return;
      }

      modal.root.classList.remove("is-open");
      document.body.style.removeProperty("overflow");
      document.removeEventListener("keydown", handleEscape);

      const triggerToRestore = activeTrigger;
      activeTrigger = null;
      modal.loading.hidden = false;
      modal.loading.textContent = "Loading reader...";
      modal.frame.removeAttribute("src");

      if (triggerToRestore) {
        triggerToRestore.focus();
      }
    }

    function getTemplateText(templateId) {
      if (!templateId) return "";
      const template = document.getElementById(templateId);
      if (!template || !("content" in template)) return "";
      return String(template.content.textContent || "").trim();
    }

    function buildViewerUrl(trigger, embedMode) {
      const params = new URLSearchParams();
      const docId = String(trigger.dataset.docId || "").trim();
      const highlightId = String(trigger.dataset.highlightId || "").trim();
      const pdfUrl = String(trigger.dataset.pdfUrl || "").trim();
      const page = String(trigger.dataset.page || "1").trim();
      const notePlain = String(trigger.dataset.notePlain || "").trim() || getTemplateText(trigger.dataset.noteTemplate || "");
      const quote = String(trigger.dataset.quote || "").trim();
      const title = String(trigger.dataset.title || "PDF footnote").trim();
      const apiBase = String(trigger.dataset.apiBase || "").trim();
      const seed = String(trigger.dataset.seedUrl || "").trim();
      const articlePath = String(trigger.dataset.articlePath || "").trim();
      const meta = String(trigger.dataset.meta || "").trim();
      const tag = String(trigger.dataset.tag || "").trim();
      const description = String(trigger.dataset.description || "").trim();

      if (embedMode) {
        params.set("view", "embed");
      }
      params.set("v", "20260307-10");

      if (docId) params.set("doc", docId);
      if (highlightId) params.set("highlight", highlightId);
      if (seed) params.set("seed", seed);
      if (apiBase) params.set("apiBase", apiBase);
      if (pdfUrl) params.set("pdf", pdfUrl);
      if (articlePath) params.set("article", articlePath);
      if (meta) params.set("meta", meta);
      if (tag) params.set("tag", tag);
      if (description) params.set("description", description);

      if (!(docId && highlightId)) {
        params.set("title", title);
        params.set("highlightLabel", title);
        params.set("page", page);
        params.set("left", String(trigger.dataset.left || "20"));
        params.set("top", String(trigger.dataset.top || "20"));
        params.set("width", String(trigger.dataset.width || "28"));
        params.set("height", String(trigger.dataset.height || "10"));
        if (notePlain) params.set("note", notePlain);
        if (quote) params.set("quote", quote);
      }

      return "/tools/pdf-guideline-studio/?" + params.toString();
    }

    function openModal(trigger) {
      ensureModal();
      activeTrigger = trigger;
      const embedUrl = buildViewerUrl(trigger, true);
      const fullReaderUrl = buildViewerUrl(trigger, false);
      const title = String(trigger.dataset.title || "PDF footnote").trim();
      const pageLabel = String(trigger.dataset.highlightId || "").trim()
        ? "Linked highlight"
        : "Page " + String(trigger.dataset.page || "1").trim();

      modal.title.textContent = title;
      modal.page.textContent = pageLabel;
      modal.source.hidden = !String(trigger.dataset.pdfUrl || "").trim();
      modal.source.href = String(trigger.dataset.pdfUrl || "#").trim() || "#";
      modal.fullReader.href = fullReaderUrl;
      modal.loading.hidden = false;
      modal.loading.textContent = "Loading reader...";
      modal.frame.src = embedUrl;
      modal.root.classList.add("is-open");
      document.body.style.overflow = "hidden";
      document.addEventListener("keydown", handleEscape);
    }

    triggers.forEach((trigger) => {
      trigger.addEventListener("click", () => openModal(trigger));
    });
  })();
</script>

<script>
  (function () {
    const adminLinks = Array.from(document.querySelectorAll("[data-guideline-admin-link]"));
    if (!adminLinks.length) return;

    try {
      const token = String(window.localStorage.getItem("pdf-guideline-studio-token") || "").trim();
      if (!token) return;
      adminLinks.forEach((link) => {
        link.hidden = false;
      });
    } catch (error) {
      console.warn("Unable to read guideline admin token", error);
    }
  })();
</script>

<script>
  (function () {
    let lightbox = null;
    let prevButton = null;
    let nextButton = null;
    let lightboxImage = null;
    let lightboxCounter = null;
    let lightboxCaption = null;
    let currentItems = [];
    let currentIndex = -1;

    function ensureImageRowLightbox() {
      if (lightbox && lightboxImage && lightboxCounter && lightboxCaption && prevButton && nextButton) {
        return;
      }

      lightbox = document.createElement("div");
      lightbox.className = "imgrow-lightbox";
      lightbox.setAttribute("aria-hidden", "true");
      lightbox.setAttribute("role", "dialog");
      lightbox.setAttribute("aria-modal", "true");
      lightbox.setAttribute("aria-label", "Image preview");

      const viewport = document.createElement("div");
      viewport.className = "imgrow-lightbox__viewport";

      prevButton = document.createElement("button");
      prevButton.className = "imgrow-lightbox__nav imgrow-lightbox__nav--prev";
      prevButton.type = "button";
      prevButton.setAttribute("aria-label", "Previous image");
      prevButton.textContent = "‹";

      const figure = document.createElement("figure");
      figure.className = "imgrow-lightbox__figure";

      lightboxImage = document.createElement("img");
      lightboxImage.className = "imgrow-lightbox__image";
      lightboxImage.alt = "";

      const meta = document.createElement("figcaption");
      meta.className = "imgrow-lightbox__meta";

      lightboxCounter = document.createElement("span");
      lightboxCounter.className = "imgrow-lightbox__counter";

      lightboxCaption = document.createElement("div");
      lightboxCaption.className = "imgrow-lightbox__caption";

      nextButton = document.createElement("button");
      nextButton.className = "imgrow-lightbox__nav imgrow-lightbox__nav--next";
      nextButton.type = "button";
      nextButton.setAttribute("aria-label", "Next image");
      nextButton.textContent = "›";

      meta.appendChild(lightboxCounter);
      meta.appendChild(lightboxCaption);
      figure.appendChild(lightboxImage);
      figure.appendChild(meta);
      viewport.appendChild(prevButton);
      viewport.appendChild(figure);
      viewport.appendChild(nextButton);
      lightbox.appendChild(viewport);
      document.body.appendChild(lightbox);

      lightbox.addEventListener("click", (event) => {
        if (event.target === lightbox) {
          closeImageRowLightbox();
        }
      });

      prevButton.addEventListener("click", (event) => {
        event.stopPropagation();
        stepImageRowLightbox(-1);
      });

      nextButton.addEventListener("click", (event) => {
        event.stopPropagation();
        stepImageRowLightbox(1);
      });
    }

    function closeImageRowLightbox() {
      if (!lightbox) {
        return;
      }
      lightbox.classList.remove("open");
      lightbox.setAttribute("aria-hidden", "true");
      currentItems = [];
      currentIndex = -1;
      document.body.classList.remove("imgrow-lightbox-open");
    }

    function updateImageRowLightbox() {
      if (!lightboxImage || !lightboxCounter || !lightboxCaption || !prevButton || !nextButton) {
        return;
      }
      if (currentIndex < 0 || currentIndex >= currentItems.length) {
        return;
      }

      const item = currentItems[currentIndex];
      lightboxImage.src = item.src;
      lightboxImage.alt = item.alt || "";
      lightboxCounter.textContent = `第 ${currentIndex + 1} / ${currentItems.length} 張`;
      lightboxCaption.textContent = item.caption || item.alt || "";
      prevButton.disabled = currentIndex === 0;
      nextButton.disabled = currentIndex === currentItems.length - 1;
    }

    function stepImageRowLightbox(direction) {
      const nextIndex = currentIndex + direction;
      if (nextIndex < 0 || nextIndex >= currentItems.length) {
        return;
      }
      currentIndex = nextIndex;
      updateImageRowLightbox();
    }

    function collectRowImages(image) {
      const row = image.closest(".md-img-row");
      if (!row) {
        return { items: [], index: -1 };
      }

      const images = Array.from(row.querySelectorAll(".md-img-col img")).filter((item) => {
        const src = (item.getAttribute("src") || item.src || "").trim();
        return Boolean(src);
      });

      const items = images.map((item) => {
        const figure = item.closest(".md-img-col");
        const captionNode = figure ? figure.querySelector("figcaption") : null;
        return {
          src: (item.getAttribute("src") || item.src || "").trim(),
          alt: (item.getAttribute("alt") || "").trim(),
          caption: captionNode ? String(captionNode.textContent || "").trim() : "",
        };
      });

      return {
        items,
        index: images.indexOf(image),
      };
    }

    function openImageRowLightbox(image) {
      const rowState = collectRowImages(image);
      if (!rowState.items.length || rowState.index < 0) {
        return;
      }

      ensureImageRowLightbox();

      currentItems = rowState.items;
      currentIndex = rowState.index;
      updateImageRowLightbox();

      lightbox.classList.add("open");
      lightbox.setAttribute("aria-hidden", "false");
      document.body.classList.add("imgrow-lightbox-open");
    }

    document.addEventListener("click", (event) => {
      if (event.defaultPrevented || event.button !== 0 || event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) {
        return;
      }

      const image = event.target.closest(".md-img-row .md-img-col img");
      if (!image) {
        return;
      }

      event.preventDefault();
      openImageRowLightbox(image);
    });

    document.addEventListener("keydown", (event) => {
      if (!lightbox || !lightbox.classList.contains("open")) {
        return;
      }

      if (event.key === "Escape") {
        closeImageRowLightbox();
        return;
      }

      if (event.key === "ArrowLeft") {
        event.preventDefault();
        stepImageRowLightbox(-1);
        return;
      }

      if (event.key === "ArrowRight") {
        event.preventDefault();
        stepImageRowLightbox(1);
      }
    });
  })();
</script>
