- title: "CPR 按壓速率教練"
  description: "用手機鏡頭即時偵測 CPR 胸外按壓速率，判斷是否落在 100–120／分 目標區，並用紅黃綠燈、即時波形、中文語音與節拍器輔助。Pose 框上半身、框內密集光流＋自相關估主頻。純前端、影像不上傳、全程裝置端運算。教學練習輔助，非醫療器材。（iOS App 測試中）"
  image: "/images/practical-tools/cpr-coach.png"
  url: "https://agoodbear.github.io/cpr-rate-coach/"
  source_label: "立即使用"

- title: "急性缺血性中風 治療決策矩陣"
  description: "以 2026 AHA/ASA 指引為本的「時間窗 × 病人型」決策矩陣，用顏色直接代表處置（溶栓／取栓／雙抗／支持），一眼掃完整片狀況；含影像篩選標準、Penumbra/Core Mismatch 定義、TNK/tPA 劑量與到院轉院路徑，並附「互動式決策流程」（點選病人情境逐步推導建議）。內容經 OpenEvidence 對照原始試驗校訂。"
  image: "/images/practical-tools/stroke-decision-matrix.png"
  url: "/tools/stroke-decision-matrix/"
  source_label: "立即使用"

