<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" width="640" height="420" role="img" aria-label="ECG 隨機考題">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f7ec7"/>
      <stop offset="1" stop-color="#0b5a92"/>
    </linearGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0H0V20" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
    </pattern>
    <pattern id="gridBig" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M100 0H0V100" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="1.4"/>
    </pattern>
  </defs>

  <rect width="640" height="420" fill="url(#bg)"/>
  <rect width="640" height="420" fill="url(#grid)"/>
  <rect width="640" height="420" fill="url(#gridBig)"/>

  <!-- ECG trace -->
  <path d="M0 250 H120 l14 -22 l9 46 l11 -150 l11 188 l11 -62 H300 l14 -22 l9 46 l11 -150 l11 188 l11 -62 H520 l14 -22 l9 46 l11 -150 l11 188 l11 -62 H640"
        fill="none" stroke="#ffffff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>

  <!-- title block -->
  <g font-family="'Noto Sans TC','PingFang TC',sans-serif">
    <text x="44" y="118" fill="#ffffff" font-size="52" font-weight="900" letter-spacing="2">ECG 隨機考題</text>
    <text x="46" y="158" fill="#d6ecfb" font-size="21" font-weight="500" letter-spacing="1">題目 · ECG 圖 · 解答 · 出處，一鍵隨機練習</text>
  </g>

  <!-- question badge -->
  <g transform="translate(548 70)">
    <circle r="40" fill="#ffffff" opacity="0.16"/>
    <circle r="30" fill="#ffffff"/>
    <text x="0" y="14" text-anchor="middle" fill="#0f7ec7" font-family="'Space Grotesk',sans-serif" font-size="42" font-weight="700">?</text>
  </g>
</svg>
