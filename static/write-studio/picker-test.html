<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Picker Test</title>
    <style>
      body {
        margin: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }
      .row {
        margin-bottom: 14px;
      }
      pre {
        padding: 12px;
        background: #f5f6f8;
        border: 1px solid #d6dbe4;
        border-radius: 8px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>Native Picker Test</h1>
    <p>這頁只用瀏覽器原生 input，不使用任何 showPicker/click 程式觸發。</p>

    <div class="row">
      <label>Pick .md file: <input id="fileInput" type="file" accept=".md,.markdown,text/plain,text/markdown" /></label>
    </div>
    <div class="row">
      <label>Pick folder: <input id="folderInput" type="file" webkitdirectory directory multiple /></label>
    </div>

    <pre id="out">Waiting...</pre>

    <script>
      const out = document.getElementById("out");
      const fileInput = document.getElementById("fileInput");
      const folderInput = document.getElementById("folderInput");

      function render(lines) {
        out.textContent = lines.join("\n");
      }

      fileInput.addEventListener("change", () => {
        const file = fileInput.files && fileInput.files[0];
        if (!file) {
          render(["File picker opened but no file selected."]);
          return;
        }
        render([
          "File picker OK",
          "name: " + file.name,
          "size: " + file.size + " bytes",
          "type: " + (file.type || "(none)"),
        ]);
      });

      folderInput.addEventListener("change", () => {
        const files = Array.from(folderInput.files || []);
        if (!files.length) {
          render(["Folder picker opened but no file selected."]);
          return;
        }
        render([
          "Folder picker OK",
          "file count: " + files.length,
          "first path: " + (files[0].webkitRelativePath || files[0].name),
        ]);
      });
    </script>
  </body>
</html>
