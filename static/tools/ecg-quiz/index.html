<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ECG 隨機考題</title>
<meta name="description" content="從 Dr. Smith ECG Blog 真實案例隨機抽題：題目、ECG 圖、解答、詳解、出處，含錯題本與回報。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --blue:#0f7ec7; --blue-d:#0b6aa9; --blue-soft:#e6f3fc;
    --ink:#16263a; --ink-soft:#4a5f76; --line:#e3ebf3;
    --ok:#16a34a; --ok-soft:#e8f7ee; --bad:#dc2626; --bad-soft:#fdeaea;
    --paper:#ffffff; --bg1:#eef4fa; --bg2:#e3ecf5;
    --mark:#fff3bf;
    --shadow:0 18px 48px rgba(18,57,93,.14);
    --radius:22px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Noto Sans TC",system-ui,-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1100px 520px at 12% -8%, #f4f9ff 0%, rgba(244,249,255,0) 60%),
      linear-gradient(160deg, var(--bg1), var(--bg2));
    min-height:100vh;-webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:760px;margin:0 auto;padding:34px 20px 56px}

  .top{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:20px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:11px;font-weight:900;font-size:1.32rem;letter-spacing:.2px}
  .brand .pulse{width:34px;height:34px;flex:0 0 auto}
  .brand .beta{font-family:"Space Grotesk",sans-serif;font-size:.62rem;font-weight:700;letter-spacing:.12em;
    color:var(--blue);background:var(--blue-soft);padding:3px 8px;border-radius:999px;transform:translateY(-2px)}
  .top-right{display:flex;align-items:center;gap:9px}
  .pill{font-size:.84rem;color:var(--ink-soft);background:#fff;border:1px solid var(--line);
    padding:7px 13px;border-radius:999px;box-shadow:0 2px 8px rgba(18,57,93,.05);cursor:default}
  .pill b{color:var(--blue);font-weight:800}
  .wrongbook{cursor:pointer;transition:all .15s ease;user-select:none}
  .wrongbook:hover{border-color:#f0b8b8;background:#fff6f6}
  .wrongbook.active{background:var(--bad);color:#fff;border-color:var(--bad)}
  .wrongbook.active b{color:#fff}
  .wrongbook.empty{opacity:.5;cursor:not-allowed}
  .auth-btn{cursor:pointer;transition:all .15s ease;user-select:none}
  .auth-btn:hover{border-color:#bcd9ee;background:#fafdff}
  .auth-btn.in{background:var(--blue-soft);border-color:#bcd9ee;color:var(--blue-d)}

  .mode-banner{display:none;align-items:center;gap:8px;background:#fff1f1;border:1px solid #f6cccc;
    color:#b03a3a;border-radius:12px;padding:9px 14px;margin-bottom:14px;font-size:.9rem;font-weight:600}
  .mode-banner.show{display:flex}
  .mode-banner button{margin-left:auto;border:0;background:#fff;color:#b03a3a;border:1px solid #f0bcbc;
    border-radius:8px;padding:4px 10px;font:inherit;font-weight:700;font-size:.82rem;cursor:pointer}

  .card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden;animation:rise .45s cubic-bezier(.2,.8,.2,1)}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  .figure{position:relative;height:248px;background:#fff;border-bottom:1px solid var(--line);overflow:hidden}
  .figure.has-img{height:auto;max-height:480px;display:flex;align-items:center;justify-content:center;background:#fbfdff}
  .figure.has-img .ecg-img{width:100%;height:auto;max-height:480px;object-fit:contain;display:block;cursor:zoom-in}
  .zoom-hint{position:absolute;right:14px;bottom:12px;font-size:.72rem;color:#fff;font-weight:600;
    background:rgba(15,23,42,.55);padding:5px 10px;border-radius:8px;pointer-events:none}
  .ecg-paper{position:absolute;inset:0;background-color:#fffafa;
    background-image:
      linear-gradient(rgba(229,115,115,.20) 1px,transparent 1px),
      linear-gradient(90deg,rgba(229,115,115,.20) 1px,transparent 1px),
      linear-gradient(rgba(229,115,115,.40) 1px,transparent 1px),
      linear-gradient(90deg,rgba(229,115,115,.40) 1px,transparent 1px);
    background-size:8px 8px,8px 8px,40px 40px,40px 40px;}
  .ecg-trace{position:absolute;inset:0;width:100%;height:100%}
  .ecg-trace path{stroke:#c0392b;stroke-width:2.1;fill:none;stroke-linejoin:round;stroke-linecap:round}
  .src-chip{position:absolute;left:14px;top:14px;display:inline-flex;align-items:center;gap:6px;
    font-size:.76rem;font-weight:700;color:#fff;padding:6px 12px;border-radius:999px;
    background:rgba(15,126,199,.92);box-shadow:0 4px 12px rgba(0,0,0,.16)}
  .src-chip .dot{width:7px;height:7px;border-radius:50%;background:#fff;opacity:.9}
  .ph-tag{position:absolute;right:14px;bottom:12px;font-size:.7rem;color:#9a5b58;
    background:rgba(255,255,255,.78);padding:4px 9px;border-radius:8px;font-weight:600}

  .body{padding:24px 24px 6px}
  .stem{font-size:1.16rem;line-height:1.6;font-weight:700;margin:0 0 18px;letter-spacing:.1px}

  .options{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:11px}
  .opt{display:flex;align-items:flex-start;gap:13px;width:100%;text-align:left;cursor:pointer;
    background:#fff;border:1.6px solid var(--line);border-radius:14px;padding:14px 16px;
    font:inherit;color:var(--ink);line-height:1.5;transition:all .16s ease}
  .opt:hover{border-color:#bcd9ee;background:#fafdff;transform:translateY(-1px)}
  .opt .key{flex:0 0 auto;width:27px;height:27px;border-radius:8px;display:grid;place-items:center;
    font-weight:800;font-size:.9rem;background:var(--blue-soft);color:var(--blue);transition:all .16s ease}
  .opt.sel{border-color:var(--blue);background:var(--blue-soft)}
  .opt.sel .key{background:var(--blue);color:#fff}
  .opt.correct{border-color:var(--ok);background:var(--ok-soft)}
  .opt.correct .key{background:var(--ok);color:#fff}
  .opt.wrong{border-color:var(--bad);background:var(--bad-soft)}
  .opt.wrong .key{background:var(--bad);color:#fff}
  .opt[disabled]{cursor:default}
  .opt .mark{margin-left:auto;font-weight:800;opacity:0;transition:opacity .2s}
  .opt.correct .mark{opacity:1;color:var(--ok)}
  .opt.wrong .mark{opacity:1;color:var(--bad)}

  .reveal{margin-top:18px;border-top:1px dashed var(--line);padding-top:18px;animation:fade .35s ease}
  .reveal[hidden]{display:none}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .ans{display:flex;align-items:center;gap:10px;font-weight:800;font-size:1.02rem;margin-bottom:11px}
  .ans .badge{font-size:.72rem;letter-spacing:.05em;color:#fff;background:var(--ok);padding:4px 10px;border-radius:999px}
  .explain{margin:0 0 4px;color:var(--ink-soft);line-height:1.8;font-size:.97rem}
  .explain strong{color:var(--ink);font-weight:800}
  .explain mark{background:var(--mark);color:#5b4a12;padding:0 4px;border-radius:3px;font-weight:600}
  .explain p{margin:0 0 12px}
  .explain p:last-child{margin-bottom:0}
  /* 值得學習的重點 callout */
  .explain .lp{margin:15px 0;background:linear-gradient(180deg,#fffdf6,#fff8ec);border:1px solid #ffe1ab;
    border-left:4px solid #f5a623;border-radius:12px;padding:14px 16px}
  .explain .lp-title{display:flex;align-items:center;gap:6px;font-weight:800;color:#a8650a;
    margin-bottom:9px;font-size:.93rem;letter-spacing:.02em}
  .explain .lp ul{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:9px}
  .explain .lp li{position:relative;padding-left:20px;line-height:1.65;color:var(--ink)}
  .explain .lp li::before{content:"▸";position:absolute;left:3px;top:0;color:#f5a623;font-weight:800}
  .explain .lp li strong{color:#8a5208}
  /* 為何其他選項不對（錯誤選項分析） */
  .explain .wo{margin:15px 0;background:#fdf5f4;border:1px solid #f1cccb;border-left:4px solid #dc6e6e;border-radius:12px;padding:14px 16px}
  .explain .wo-title{display:flex;align-items:center;gap:6px;font-weight:800;color:#a93c3c;margin-bottom:9px;font-size:.93rem}
  .explain .wo ul{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:9px}
  .explain .wo li{position:relative;padding-left:22px;line-height:1.65;color:var(--ink)}
  .explain .wo li::before{content:"✗";position:absolute;left:3px;top:0;color:#dc6e6e;font-weight:800}
  .explain .wo li strong{color:#a33}
  /* 觸類旁通延伸 */
  .explain .extend{margin:14px 0 0;background:#f4f9ff;border:1px solid #e0eefb;border-radius:11px;
    padding:12px 15px;line-height:1.7}
  .explain .extend strong{color:var(--blue-d)}
  /* 一般小標 */
  .explain .lead{font-weight:800;color:var(--ink);background:#eef2f6;border-radius:6px;padding:1px 8px;margin-right:5px;font-size:.86rem}

  .related{margin-top:16px;background:#f6faff;border:1px solid #e0eefb;border-radius:12px;padding:13px 15px}
  .related-title{font-size:.82rem;font-weight:800;color:var(--blue-d);margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .related ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:6px}
  .related a{color:var(--blue);text-decoration:none;font-size:.9rem;line-height:1.45;display:inline-flex;gap:6px}
  .related a:hover{text-decoration:underline}
  .related a::before{content:"↗";opacity:.6;flex:0 0 auto}

  .source{display:inline-flex;align-items:center;gap:7px;font-size:.86rem;font-weight:600;margin-top:16px;
    color:var(--blue);text-decoration:none;background:var(--blue-soft);padding:8px 13px;border-radius:10px}
  .source:hover{background:#d6ecfb}
  .source.nolink{color:var(--ink-soft);background:#f1f5f9;pointer-events:none}

  .tags{display:flex;flex-wrap:wrap;gap:7px;margin:16px 0 0}
  .tag{font-size:.74rem;font-weight:600;color:var(--ink-soft);background:#f1f5f9;border:1px solid var(--line);padding:4px 10px;border-radius:8px}

  .actions{display:flex;gap:11px;padding:18px 24px 8px;flex-wrap:wrap}
  .btn{flex:1;min-width:140px;border:0;border-radius:13px;padding:14px 18px;font:inherit;font-weight:800;font-size:1rem;cursor:pointer;transition:all .16s ease}
  .btn.primary{color:#fff;background:linear-gradient(180deg,#1389d4,var(--blue));box-shadow:0 8px 20px rgba(15,126,199,.32)}
  .btn.primary:hover{background:var(--blue-d);transform:translateY(-1px)}
  .btn.ghost{color:var(--blue);background:#fff;border:1.6px solid #bcd9ee}
  .btn.ghost:hover{background:var(--blue-soft);transform:translateY(-1px)}
  .btn:disabled{opacity:.45;cursor:default;transform:none;box-shadow:none}

  .card-foot{display:flex;justify-content:flex-end;padding:0 24px 20px}
  .report-link{background:none;border:0;color:#94a3b8;font:inherit;font-size:.84rem;cursor:pointer;padding:6px;display:inline-flex;align-items:center;gap:5px}
  .report-link:hover{color:var(--bad)}

  .foot{text-align:center;color:#8194a8;font-size:.78rem;margin-top:22px;line-height:1.6}
  .foot kbd{font-family:"Space Grotesk",monospace;background:#fff;border:1px solid var(--line);border-bottom-width:2px;border-radius:6px;padding:1px 6px;font-size:.74rem;color:var(--ink-soft)}

  /* lightbox */
  .lightbox{position:fixed;inset:0;z-index:80;display:none;background:rgba(8,15,26,.92);overflow:auto;padding:24px;cursor:zoom-out;text-align:center}
  .lightbox.open{display:block}
  .lightbox img{max-width:none;min-width:100%;height:auto;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .lightbox-close{position:fixed;top:16px;right:18px;width:42px;height:42px;border:0;border-radius:50%;background:rgba(255,255,255,.18);color:#fff;font-size:1.5rem;line-height:1;cursor:pointer;z-index:81}
  /* 對齊時間軸的紅色垂直 caliper */
  .caliper{position:fixed;top:0;left:50%;width:2px;height:100%;background:#ff2d2d;z-index:83;display:none;
    box-shadow:0 0 7px rgba(255,45,45,.7)}
  .lightbox.open .caliper{display:block}
  .caliper::after{content:"";position:absolute;top:0;left:-11px;width:24px;height:100%;cursor:ew-resize}
  .caliper-grip{position:absolute;top:64px;left:50%;transform:translateX(-50%);background:#ff2d2d;color:#fff;
    font-size:.78rem;font-weight:700;padding:4px 9px;border-radius:8px;white-space:nowrap;cursor:ew-resize;
    user-select:none;touch-action:none;box-shadow:0 2px 8px rgba(0,0,0,.3)}
  .caliper-hint{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:84;color:#fff;
    background:rgba(8,15,26,.7);padding:6px 13px;border-radius:999px;font-size:.8rem;display:none}
  .lightbox.open .caliper-hint{display:block}
  /* lightbox 工具列 */
  .lb-toolbar{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:85;display:none;gap:7px;
    align-items:center;background:rgba(8,15,26,.82);padding:7px 11px;border-radius:999px;flex-wrap:wrap;justify-content:center;max-width:94vw}
  .lightbox.open .lb-toolbar{display:flex}
  .lb-tool{border:0;background:rgba(255,255,255,.16);color:#fff;font:inherit;font-size:.8rem;font-weight:700;
    padding:6px 12px;border-radius:999px;cursor:pointer;transition:background .15s}
  .lb-tool:hover{background:rgba(255,255,255,.28)}
  .lb-tool.on{background:#0f7ec7}
  .lb-readout{color:#fff;font-size:.8rem;font-weight:700;white-space:nowrap;padding:0 4px}
  /* 量間距卡尺雙線 */
  .cal-line{position:fixed;top:0;width:2px;height:100%;z-index:82;display:none;background:#22d3ee;box-shadow:0 0 6px rgba(34,211,238,.75)}
  .lightbox.open .cal-line.show{display:block}
  .cal-line::after{content:"";position:absolute;top:0;left:-12px;width:26px;height:100%;cursor:ew-resize}
  .cal-line .cap{position:absolute;top:108px;left:50%;transform:translateX(-50%);background:#0891b2;color:#fff;
    font-size:.72rem;font-weight:700;padding:3px 7px;border-radius:6px;cursor:ew-resize}
  /* 放大鏡 */
  .loupe{position:fixed;width:180px;height:180px;border-radius:50%;border:3px solid #fff;
    box-shadow:0 8px 24px rgba(0,0,0,.55);z-index:86;pointer-events:none;display:none;
    background-repeat:no-repeat;background-color:#fff}
  /* 相關篇章站內跳轉 */
  .related a.rel-internal::before{content:"▶";color:var(--blue);opacity:1}
  .related a.rel-internal{font-weight:700}

  /* report modal */
  .modal{position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;padding:18px}
  .modal.open{display:flex}
  .modal-bg{position:absolute;inset:0;background:rgba(15,23,42,.55)}
  .modal-box{position:relative;z-index:1;width:min(440px,96vw);background:#fff;border-radius:18px;padding:22px;box-shadow:0 24px 60px rgba(0,0,0,.3)}
  .modal-box h3{margin:0 0 4px;font-size:1.12rem}
  .modal-box .sub{margin:0 0 16px;color:var(--ink-soft);font-size:.86rem}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:.84rem;font-weight:700;margin-bottom:6px;color:var(--ink)}
  .field select,.field textarea{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;font:inherit;color:var(--ink)}
  .field textarea{min-height:74px;resize:vertical}
  .modal-actions{display:flex;gap:10px;margin-top:6px}
  .modal-actions .btn{min-width:0}
  .modal-msg{font-size:.86rem;margin-top:10px;min-height:1.2em}
  .modal-msg.ok{color:var(--ok)}
  .modal-msg.err{color:var(--bad)}

  html.is-embedded body{background:#f4f8fc}
  html.is-embedded .wrap{padding:18px 16px 30px}
  html.is-embedded .top{margin-bottom:14px}

  @media(max-width:560px){
    .wrap{padding:22px 14px 40px}
    .brand{font-size:1.12rem}
    .stem{font-size:1.07rem}
    .figure{height:200px}
    .btn{min-width:100%}
    .top-right{width:100%;justify-content:space-between}
  }
</style>
</head>
<body>
<script>
  (function(){
    var p=new URLSearchParams(location.search);
    if(p.get("embed")==="1"||window.self!==window.top){document.documentElement.classList.add("is-embedded");}
  })();
</script>
<main class="wrap">
  <div class="top">
    <div class="brand">
      <svg class="pulse" viewBox="0 0 40 40" fill="none" aria-hidden="true">
        <rect width="40" height="40" rx="11" fill="#0f7ec7"/>
        <path d="M5 21h7l3-9 4 17 4-13 2.5 5H35" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      ECG 隨機考題 <span class="beta">BETA</span>
    </div>
    <div class="top-right">
      <button class="pill auth-btn" id="authBtn" title="登入後錯題本跨裝置同步、只屬於你">🔐 用 Google 登入</button>
      <button class="pill wrongbook empty" id="wrongbook" title="只練答錯過的題目">🗂 錯題本 <b id="wrongCount">0</b></button>
      <span class="pill">已練習 <b id="doneCount">0</b></span>
    </div>
  </div>

  <div class="mode-banner" id="modeBanner">
    <span>📕 錯題本模式：只出你答錯過的題（<b id="modeWrongN">0</b> 題）</span>
    <button id="exitWrong">回到全部題目</button>
  </div>

  <section class="card" id="card" aria-live="polite">
    <div class="figure" id="figure"></div>
    <div class="body">
      <h1 class="stem" id="stem">載入中…</h1>
      <ul class="options" id="options"></ul>
      <div class="reveal" id="reveal" hidden>
        <div class="ans"><span class="badge">解答</span><span id="ansText"></span></div>
        <div class="explain" id="explain"></div>
        <div class="related" id="related" hidden>
          <div class="related-title">📚 Smith 相關篇章</div>
          <ul id="relatedList"></ul>
        </div>
        <a class="source" id="source" target="_blank" rel="noopener"></a>
        <div class="tags" id="tags"></div>
      </div>
    </div>
    <div class="actions">
      <button class="btn primary" id="revealBtn">看解答</button>
      <button class="btn ghost" id="nextBtn">下一題（隨機）</button>
    </div>
    <div class="card-foot">
      <button class="report-link" id="reportBtn">🚩 這題怪怪的？回報</button>
    </div>
  </section>

  <p class="foot">
    教學練習用途・ECG 圖片版權屬原作者，僅供學習引用<br>
    快捷鍵：<kbd>1</kbd>–<kbd>4</kbd> 選答案・<kbd>Space</kbd> 看解答・<kbd>N</kbd> 下一題
  </p>
</main>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose" aria-label="關閉">×</button>
  <div class="lb-toolbar">
    <button class="lb-tool" id="toolCal">📏 量間距</button>
    <button class="lb-tool" id="toolCalib">校準＝1大格(200ms)</button>
    <button class="lb-tool" id="toolMag">🔍 放大鏡</button>
    <span class="lb-readout" id="calRead">拖紅線對齊時間軸</span>
  </div>
  <img id="lightboxImg" alt="ECG 放大檢視" referrerpolicy="no-referrer">
  <div class="caliper" id="caliper"><span class="caliper-grip">⇄ 時間軸</span></div>
  <div class="cal-line cal-a" id="calA"><span class="cap">A</span></div>
  <div class="cal-line cal-b" id="calB"><span class="cap">B</span></div>
  <div class="loupe" id="loupe"></div>
</div>

<div class="modal" id="reportModal">
  <div class="modal-bg" data-close-report></div>
  <div class="modal-box" role="dialog" aria-modal="true">
    <h3>回報這題</h3>
    <p class="sub">回報會送到管理後台的「使用者回饋」，感謝你幫忙改進題庫。</p>
    <div class="field">
      <label for="reportCat">問題類別</label>
      <select id="reportCat">
        <option>圖片看不到／怪</option>
        <option>答案好像錯</option>
        <option>題目文字怪</option>
        <option>詳解怪怪的</option>
        <option>選項怪</option>
        <option>其他</option>
      </select>
    </div>
    <div class="field">
      <label for="reportNote">補充說明（可選）</label>
      <textarea id="reportNote" placeholder="例如：V6 的 ST 我覺得沒有抬高…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn primary" id="reportSend">送出回報</button>
      <button class="btn ghost" data-close-report>取消</button>
    </div>
    <div class="modal-msg" id="reportMsg"></div>
  </div>
</div>

<script>
const SB_URL="https://ftnrvkvzzvlfvdqirhxq.supabase.co";
const SB_KEY="sb_publishable_nfZvsG0mzj5hTpfgxpED3Q_DcwmqX07";
const sb = (window.supabase && window.supabase.createClient) ? window.supabase.createClient(SB_URL, SB_KEY) : null;

const SOURCES = {
  own:   {name:"自有個案", color:"#0f7ec7"},
  smith: {name:"Dr. Smith's ECG Blog", color:"#7c3aed"},
  litfl: {name:"LITFL", color:"#0d9488"},
  grauer:{name:"Ken Grauer (ECG Blog)", color:"#d97706"}
};
const TRACES = [
  "M0 130 H40 l6 -10 l4 20 l5 -55 l5 70 l5 -25 H120 l6 -10 l4 20 l5 -55 l5 70 l5 -25 H200 l6 -10 l4 20 l5 -55 l5 70 l5 -25 H280 l6 -10 l4 20 l5 -55 l5 70 l5 -25 H360",
  "M0 135 q10 0 14 0 l4 -8 l4 16 l5 -62 l5 78 l6 -24 q8 6 16 0 q10 -2 18 4 H120 l4 -8 l4 16 l5 -62 l5 78 l6 -24 q10 4 22 2 H230 l4 -8 l4 16 l5 -62 l5 78 l6 -24 H360",
  "M0 128 H30 l5 -6 l5 12 l5 -48 l5 64 l5 -22 q9 8 20 6 q12 -2 18 6 H150 l5 -6 l5 12 l5 -48 l5 64 l5 -22 H260 l5 -6 l5 12 l5 -48 l5 64 l5 -22 H360"
];
function placeholder(src, idx){
  const c=(SOURCES[src]||SOURCES.own).color, trace=TRACES[idx%TRACES.length];
  return '<div class="ecg-paper"></div><svg class="ecg-trace" viewBox="0 0 360 200" preserveAspectRatio="none" aria-hidden="true"><path d="'+trace+'" style="stroke:'+c+'"/></svg><span class="ph-tag">範例佔位圖</span>';
}

const WRONG_KEY="ecgquiz_wrong_v1";
let BANK=[], cur=-1, done=0, picked=null, revealed=false, mode="all";
let wrongSet=new Set(), currentUser=null;
try{ wrongSet=new Set(JSON.parse(localStorage.getItem(WRONG_KEY)||"[]")); }catch(e){}

const $=id=>document.getElementById(id);
const figure=$("figure"),stem=$("stem"),optionsEl=$("options"),reveal=$("reveal"),
  ansText=$("ansText"),explainEl=$("explain"),relatedEl=$("related"),relatedList=$("relatedList"),
  sourceEl=$("source"),tagsEl=$("tags"),revealBtn=$("revealBtn"),nextBtn=$("nextBtn"),
  doneCount=$("doneCount"),wrongCount=$("wrongCount"),wrongbook=$("wrongbook"),
  modeBanner=$("modeBanner"),modeWrongN=$("modeWrongN");
const KEYS=["A","B","C","D","E","F"];

function saveWrong(){ try{ localStorage.setItem(WRONG_KEY, JSON.stringify([...wrongSet])); }catch(e){} }
function wrongInBank(){ return BANK.filter(q=>wrongSet.has(q.id)); }
function refreshWrongUI(){
  const n=wrongInBank().length;
  wrongCount.textContent=n;
  wrongbook.classList.toggle("empty", n===0 && mode!=="wrong");
  modeWrongN.textContent=n;
}

function srcChip(q){ const s=SOURCES[q.source]||SOURCES.own; return '<span class="src-chip" style="background:'+s.color+'e8"><span class="dot"></span>'+s.name+'</span>'; }

function openLightbox(url){ $("lightboxImg").src=url; $("lightbox").classList.add("open"); document.body.style.overflow="hidden"; $("caliper").style.left=Math.round(window.innerWidth/2)+"px"; }
function closeLightbox(){ $("lightbox").classList.remove("open"); $("lightboxImg").src=""; document.body.style.overflow=""; if(window.__resetLbTools)window.__resetLbTools(); }

const urlToId=new Map();
function normUrl(u){ return (u||"").trim().replace(/[#?].*$/,"").replace(/\/+$/,"").toLowerCase(); }
function jumpTo(id){ const i=BANK.findIndex(x=>x.id===id); if(i>=0){ cur=i; render(BANK[i],i); window.scrollTo({top:0,behavior:"smooth"}); } }

function render(q,idx){
  picked=null; revealed=false;
  if(q.image){
    figure.className="figure has-img";
    figure.innerHTML='<img class="ecg-img" src="'+q.image+'" alt="ECG 12 導程" referrerpolicy="no-referrer">'+srcChip(q)+'<span class="zoom-hint">🔍 點圖放大</span>';
    figure.querySelector(".ecg-img").addEventListener("click",()=>openLightbox(q.image));
  }else{
    figure.className="figure";
    figure.innerHTML=placeholder(q.source,idx)+srcChip(q);
  }
  stem.textContent=q.stem;
  optionsEl.innerHTML=q.options.map((o,i)=>'<button class="opt" data-i="'+i+'"><span class="key">'+KEYS[i]+'</span><span>'+o+'</span><span class="mark"></span></button>').join("");
  optionsEl.querySelectorAll(".opt").forEach(b=>b.addEventListener("click",()=>select(+b.dataset.i)));
  reveal.hidden=true; revealBtn.disabled=false; revealBtn.textContent="看解答";
}

function select(i){
  if(revealed) return;
  picked=i;
  optionsEl.querySelectorAll(".opt").forEach(b=>b.classList.toggle("sel",+b.dataset.i===i));
}

function doReveal(){
  if(revealed) return;
  const q=BANK[cur];
  revealed=true; done++; doneCount.textContent=done;
  optionsEl.querySelectorAll(".opt").forEach(b=>{
    const i=+b.dataset.i; b.disabled=true; b.classList.remove("sel");
    if(i===q.answer){b.classList.add("correct"); b.querySelector(".mark").textContent="✓";}
    else if(i===picked){b.classList.add("wrong"); b.querySelector(".mark").textContent="✗";}
  });
  // 錯題本：答錯加入、答對移除（登入時同步雲端，每人專屬）
  if(picked!==null && picked!==q.answer){ wrongSet.add(q.id); syncWrong(q.id,true); }
  else if(picked===q.answer){ wrongSet.delete(q.id); syncWrong(q.id,false); }
  saveWrong(); refreshWrongUI();

  ansText.textContent=KEYS[q.answer]+"．"+q.options[q.answer];
  explainEl.innerHTML=q.explain||"";
  // 相關篇章
  const rel=Array.isArray(q.related)?q.related:[];
  if(rel.length){
    relatedList.innerHTML=rel.map(r=>{
      const inBank=urlToId.get(normUrl(r.url));
      if(inBank && inBank!==q.id) return '<li><a href="#" class="rel-internal" data-qid="'+inBank+'">'+r.title+'（在此練這題）</a></li>';
      return '<li><a href="'+r.url+'" target="_blank" rel="noopener">'+r.title+'</a></li>';
    }).join("");
    relatedList.querySelectorAll(".rel-internal").forEach(a=>a.addEventListener("click",e=>{e.preventDefault(); jumpTo(a.dataset.qid);}));
    relatedEl.hidden=false;
  }else relatedEl.hidden=true;
  // 出處
  const s=SOURCES[q.source]||SOURCES.own;
  if(q.sourceUrl){ sourceEl.className="source"; sourceEl.href=q.sourceUrl; sourceEl.innerHTML="出處："+s.name+" ↗"; }
  else{ sourceEl.className="source nolink"; sourceEl.removeAttribute("href"); sourceEl.innerHTML="出處："+s.name; }
  tagsEl.innerHTML=(q.tags||[]).map(t=>'<span class="tag">#'+t+'</span>').join("");

  reveal.hidden=false; revealBtn.disabled=true; revealBtn.textContent="已揭曉";
}

function next(){
  const pool = mode==="wrong" ? wrongInBank() : BANK;
  if(mode==="wrong" && pool.length===0){ exitWrongMode(true); return; }
  if(pool.length===1){ cur=BANK.indexOf(pool[0]); }
  else{
    let pick; do{ pick=pool[Math.floor(Math.random()*pool.length)]; }while(BANK.indexOf(pick)===cur);
    cur=BANK.indexOf(pick);
  }
  render(BANK[cur],cur);
}

function enterWrongMode(){
  if(wrongInBank().length===0) return;
  mode="wrong"; wrongbook.classList.add("active"); modeBanner.classList.add("show");
  refreshWrongUI(); next();
}
function exitWrongMode(cleared){
  mode="all"; wrongbook.classList.remove("active"); modeBanner.classList.remove("show");
  refreshWrongUI();
  if(cleared){ stem.textContent="🎉 錯題本清空了！已切回全部題目。"; }
  next();
}

// 回報
const reportModal=$("reportModal"),reportMsg=$("reportMsg");
function openReport(){ reportMsg.textContent=""; reportMsg.className="modal-msg"; reportModal.classList.add("open"); }
function closeReport(){ reportModal.classList.remove("open"); }
async function sendReport(){
  const q=BANK[cur]; if(!q) return;
  const btn=$("reportSend"); btn.disabled=true; reportMsg.className="modal-msg"; reportMsg.textContent="送出中…";
  const payload={ p_qid:q.id, p_category:$("reportCat").value, p_note:$("reportNote").value||"",
    p_stem:q.stem||"", p_url:location.origin+location.pathname+"?q="+encodeURIComponent(q.id) };
  try{
    if(!sb) throw new Error("no client");
    const {error}=await sb.rpc("submit_ecg_quiz_feedback", payload);
    if(error) throw error;
    reportMsg.className="modal-msg ok"; reportMsg.textContent="✓ 已送出，感謝回報！";
    $("reportNote").value="";
    setTimeout(closeReport,1200);
  }catch(e){
    reportMsg.className="modal-msg err"; reportMsg.textContent="送出失敗，請稍後再試。";
  }finally{ btn.disabled=false; }
}

revealBtn.addEventListener("click",doReveal);
nextBtn.addEventListener("click",next);
wrongbook.addEventListener("click",()=>{ mode==="wrong"?exitWrongMode(false):enterWrongMode(); });
$("exitWrong").addEventListener("click",()=>exitWrongMode(false));
$("reportBtn").addEventListener("click",openReport);
$("reportSend").addEventListener("click",sendReport);
reportModal.querySelectorAll("[data-close-report]").forEach(el=>el.addEventListener("click",closeReport));
$("lightboxClose").addEventListener("click",closeLightbox);
$("lightbox").addEventListener("click",e=>{ if(e.target===$("lightbox")) closeLightbox(); });
(function(){
  const redLine=$("caliper"), calA=$("calA"), calB=$("calB"), loupe=$("loupe"),
        toolCal=$("toolCal"), toolMag=$("toolMag"), toolCalib=$("toolCalib"), calRead=$("calRead"), lbImg=$("lightboxImg");
  let dragTarget=null, calMode=false, magMode=false, msPerPx=0;
  const cx=e=>(e.touches&&e.touches[0])?e.touches[0].clientX:e.clientX;
  const cy=e=>(e.touches&&e.touches[0])?e.touches[0].clientY:e.clientY;
  function startDrag(el){ return e=>{ dragTarget=el; e.stopPropagation(); if(e.cancelable)e.preventDefault(); }; }
  [redLine,calA,calB].forEach(el=>{ el.addEventListener("pointerdown",startDrag(el)); el.addEventListener("touchstart",startDrag(el),{passive:false}); });
  function readout(){
    if(!calMode){ return; }
    const gap=Math.abs((parseFloat(calA.style.left)||0)-(parseFloat(calB.style.left)||0));
    let t="A↔B "+Math.round(gap)+" px";
    if(msPerPx>0){ const ms=gap*msPerPx; t+=" ≈ "+Math.round(ms)+" ms"; if(ms>=200&&ms<=2500) t+="（HR "+Math.round(60000/ms)+"）"; }
    else t+="（按校準）";
    calRead.textContent=t;
  }
  function moveLoupe(e){
    const r=lbImg.getBoundingClientRect(), px=cx(e), py=cy(e);
    if(px<r.left||px>r.right||py<r.top||py>r.bottom){ loupe.style.display="none"; return; }
    loupe.style.display="block";
    const Z=2.4, size=180, x=px-r.left, y=py-r.top;
    loupe.style.backgroundImage="url('"+lbImg.src+"')";
    loupe.style.backgroundSize=(r.width*Z)+"px "+(r.height*Z)+"px";
    loupe.style.backgroundPosition=(-(x*Z-size/2))+"px "+(-(y*Z-size/2))+"px";
    loupe.style.left=(px-size/2)+"px"; loupe.style.top=(py-size/2)+"px";
  }
  function onMove(e){
    if(dragTarget){ dragTarget.style.left=Math.max(0,Math.min(window.innerWidth,cx(e)))+"px"; readout(); }
    if(magMode) moveLoupe(e);
  }
  document.addEventListener("pointermove",onMove); document.addEventListener("touchmove",onMove,{passive:false});
  document.addEventListener("pointerup",()=>{dragTarget=null;}); document.addEventListener("touchend",()=>{dragTarget=null;});
  toolCal.addEventListener("click",e=>{ e.stopPropagation(); calMode=!calMode; toolCal.classList.toggle("on",calMode);
    calA.classList.toggle("show",calMode); calB.classList.toggle("show",calMode);
    if(calMode){ calA.style.left=Math.round(window.innerWidth*0.42)+"px"; calB.style.left=Math.round(window.innerWidth*0.58)+"px"; readout(); }
    else calRead.textContent="拖紅線對齊時間軸"; });
  toolCalib.addEventListener("click",e=>{ e.stopPropagation(); if(!calMode){ toolCal.click(); }
    const gap=Math.abs((parseFloat(calA.style.left)||0)-(parseFloat(calB.style.left)||0));
    if(gap>3){ msPerPx=200/gap; calRead.textContent="已校準：A↔B＝200ms（再拖去量）"; setTimeout(readout,1400); } });
  toolMag.addEventListener("click",e=>{ e.stopPropagation(); magMode=!magMode; toolMag.classList.toggle("on",magMode);
    if(!magMode){ loupe.style.display="none"; } });
  window.__resetLbTools=function(){ calMode=false;magMode=false;msPerPx=0;
    toolCal.classList.remove("on");toolMag.classList.remove("on");
    calA.classList.remove("show");calB.classList.remove("show");loupe.style.display="";
    calRead.textContent="拖紅線對齊時間軸"; };
})();
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){ if($("lightbox").classList.contains("open"))closeLightbox(); else if(reportModal.classList.contains("open"))closeReport(); return; }
  if($("lightbox").classList.contains("open")||reportModal.classList.contains("open")) return;
  if(e.key>="1"&&e.key<="6"){const i=+e.key-1; if(BANK[cur]&&i<BANK[cur].options.length) select(i);}
  else if(e.code==="Space"){e.preventDefault(); revealed?next():doReveal();}
  else if(e.key==="n"||e.key==="N"){next();}
});

// ===== Google 登入 + 雲端錯題本（每人專屬，RLS 隔離）=====
const authBtn=$("authBtn");
const inIframe = window.self!==window.top;
function setAuthUI(){
  if(currentUser){
    const label=currentUser.email?currentUser.email.split("@")[0]:"已登入";
    authBtn.innerHTML="👤 "+label+" · 登出"; authBtn.classList.add("in");
    authBtn.title=(currentUser.email||"")+"（雲端同步錯題本）｜點擊登出";
  }else{
    authBtn.innerHTML="🔐 用 Google 登入"; authBtn.classList.remove("in");
    authBtn.title="登入後錯題本跨裝置同步、只屬於你";
  }
}
async function loadCloudWrong(){
  if(!sb||!currentUser) return;
  try{
    const localIds=[...wrongSet];
    if(localIds.length){ await sb.from("ecg_quiz_wrong").upsert(localIds.map(qid=>({user_id:currentUser.id,question_id:qid})),{onConflict:"user_id,question_id"}); }
    const {data}=await sb.from("ecg_quiz_wrong").select("question_id");
    if(data){ wrongSet=new Set(data.map(r=>r.question_id)); saveWrong(); refreshWrongUI(); }
  }catch(e){}
}
async function syncWrong(qid,isWrong){
  if(!sb||!currentUser) return;
  try{
    if(isWrong) await sb.from("ecg_quiz_wrong").upsert({user_id:currentUser.id,question_id:qid},{onConflict:"user_id,question_id"});
    else await sb.from("ecg_quiz_wrong").delete().eq("user_id",currentUser.id).eq("question_id",qid);
  }catch(e){}
}
async function doLogin(){
  if(!sb) return;
  if(inIframe){ window.open(location.pathname,"_blank"); return; }
  await sb.auth.signInWithOAuth({provider:"google",options:{redirectTo:location.origin+location.pathname}});
}
async function doLogout(){ if(sb){ await sb.auth.signOut(); } currentUser=null; setAuthUI(); }
authBtn.addEventListener("click",()=>{ currentUser?doLogout():doLogin(); });
if(sb){
  sb.auth.getSession().then(({data})=>{ currentUser=(data&&data.session)?data.session.user:null; setAuthUI(); if(currentUser) loadCloudWrong(); });
  sb.auth.onAuthStateChange((_e,session)=>{ const was=currentUser; currentUser=session?session.user:null; setAuthUI(); if(currentUser&&!was) loadCloudWrong(); });
}else setAuthUI();

fetch("./quiz.json").then(r=>r.json()).then(d=>{
  BANK=d.questions||[];
  if(!BANK.length){stem.textContent="目前尚無題目。"; return;}
  urlToId.clear(); BANK.forEach(q=>{ if(q.sourceUrl) urlToId.set(normUrl(q.sourceUrl), q.id); });
  refreshWrongUI();
  const want=new URLSearchParams(location.search).get("q");
  const startIdx = want ? BANK.findIndex(q=>q.id===want) : -1;
  if(startIdx>=0){ cur=startIdx; render(BANK[cur],cur); } else next();
}).catch(()=>{stem.textContent="題庫載入失敗。";});
</script>
</body>
