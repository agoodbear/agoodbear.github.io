<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ECG 隨機考題</title>
<meta name="description" content="從 ECG 教學部落格與自有個案隨機抽題：題目、ECG 圖、解答、出處，一鍵練習。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#0f7ec7; --blue-d:#0b6aa9; --blue-soft:#e6f3fc;
    --ink:#16263a; --ink-soft:#4a5f76; --line:#e3ebf3;
    --ok:#16a34a; --ok-soft:#e8f7ee; --bad:#dc2626; --bad-soft:#fdeaea;
    --paper:#ffffff; --bg1:#eef4fa; --bg2:#e3ecf5;
    --shadow:0 18px 48px rgba(18,57,93,.14);
    --radius:22px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Noto Sans TC",system-ui,-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1100px 520px at 12% -8%, #f4f9ff 0%, rgba(244,249,255,0) 60%),
      linear-gradient(160deg, var(--bg1), var(--bg2));
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:760px;margin:0 auto;padding:34px 20px 56px}

  /* top bar */
  .top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px}
  .brand{display:flex;align-items:center;gap:11px;font-weight:900;font-size:1.32rem;letter-spacing:.2px}
  .brand .pulse{width:34px;height:34px;flex:0 0 auto}
  .brand .beta{
    font-family:"Space Grotesk",sans-serif;font-size:.62rem;font-weight:700;letter-spacing:.12em;
    color:var(--blue);background:var(--blue-soft);padding:3px 8px;border-radius:999px;transform:translateY(-2px)}
  .counter{font-size:.86rem;color:var(--ink-soft);background:#fff;border:1px solid var(--line);
    padding:7px 13px;border-radius:999px;box-shadow:0 2px 8px rgba(18,57,93,.05)}
  .counter b{color:var(--blue);font-weight:800}

  /* card */
  .card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden;animation:rise .45s cubic-bezier(.2,.8,.2,1)}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  /* figure (ECG) */
  .figure{position:relative;height:248px;background:#fff;border-bottom:1px solid var(--line);overflow:hidden}
  .figure.has-img{height:auto;max-height:480px;display:flex;align-items:center;justify-content:center;background:#fbfdff}
  .figure.has-img .ecg-img{width:100%;height:auto;max-height:480px;object-fit:contain;display:block;cursor:zoom-in}
  .zoom-hint{position:absolute;right:14px;bottom:12px;font-size:.72rem;color:#fff;font-weight:600;
    background:rgba(15,23,42,.55);padding:5px 10px;border-radius:8px;pointer-events:none;display:flex;gap:5px;align-items:center}
  .ecg-paper{
    position:absolute;inset:0;
    background-color:#fffafa;
    background-image:
      linear-gradient(rgba(229,115,115,.20) 1px,transparent 1px),
      linear-gradient(90deg,rgba(229,115,115,.20) 1px,transparent 1px),
      linear-gradient(rgba(229,115,115,.40) 1px,transparent 1px),
      linear-gradient(90deg,rgba(229,115,115,.40) 1px,transparent 1px);
    background-size:8px 8px,8px 8px,40px 40px,40px 40px;
  }
  .ecg-trace{position:absolute;inset:0;width:100%;height:100%}
  .ecg-trace path{stroke:#c0392b;stroke-width:2.1;fill:none;stroke-linejoin:round;stroke-linecap:round;
    filter:drop-shadow(0 1px 1px rgba(192,57,43,.18))}
  .src-chip{position:absolute;left:14px;top:14px;display:inline-flex;align-items:center;gap:6px;
    font-size:.76rem;font-weight:700;color:#fff;padding:6px 12px;border-radius:999px;
    background:rgba(15,126,199,.92);backdrop-filter:blur(3px);box-shadow:0 4px 12px rgba(0,0,0,.16)}
  .src-chip .dot{width:7px;height:7px;border-radius:50%;background:#fff;opacity:.9}
  .ph-tag{position:absolute;right:14px;bottom:12px;font-size:.7rem;color:#9a5b58;
    background:rgba(255,255,255,.78);padding:4px 9px;border-radius:8px;font-weight:600}

  /* body */
  .body{padding:24px 24px 6px}
  .tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:13px}
  .tag{font-size:.74rem;font-weight:600;color:var(--ink-soft);background:#f1f5f9;
    border:1px solid var(--line);padding:4px 10px;border-radius:8px}
  .stem{font-size:1.16rem;line-height:1.6;font-weight:700;margin:0 0 18px;letter-spacing:.1px}

  .options{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:11px}
  .opt{display:flex;align-items:flex-start;gap:13px;width:100%;text-align:left;cursor:pointer;
    background:#fff;border:1.6px solid var(--line);border-radius:14px;padding:14px 16px;
    font:inherit;color:var(--ink);line-height:1.5;transition:all .16s ease}
  .opt:hover{border-color:#bcd9ee;background:#fafdff;transform:translateY(-1px)}
  .opt .key{flex:0 0 auto;width:27px;height:27px;border-radius:8px;display:grid;place-items:center;
    font-weight:800;font-size:.9rem;background:var(--blue-soft);color:var(--blue);transition:all .16s ease}
  .opt.sel{border-color:var(--blue);background:var(--blue-soft)}
  .opt.sel .key{background:var(--blue);color:#fff}
  .opt.correct{border-color:var(--ok);background:var(--ok-soft)}
  .opt.correct .key{background:var(--ok);color:#fff}
  .opt.wrong{border-color:var(--bad);background:var(--bad-soft)}
  .opt.wrong .key{background:var(--bad);color:#fff}
  .opt[disabled]{cursor:default}
  .opt .mark{margin-left:auto;font-weight:800;opacity:0;transition:opacity .2s}
  .opt.correct .mark{opacity:1;color:var(--ok)}
  .opt.wrong .mark{opacity:1;color:var(--bad)}

  /* reveal */
  .reveal{margin-top:18px;border-top:1px dashed var(--line);padding-top:18px;
    animation:fade .35s ease}
  .reveal[hidden]{display:none}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .ans{display:flex;align-items:center;gap:10px;font-weight:800;font-size:1.02rem;margin-bottom:9px}
  .ans .badge{font-size:.72rem;letter-spacing:.05em;color:#fff;background:var(--ok);
    padding:4px 10px;border-radius:999px}
  .explain{margin:0 0 16px;color:var(--ink-soft);line-height:1.72;font-size:.96rem}
  .source{display:inline-flex;align-items:center;gap:7px;font-size:.86rem;font-weight:600;
    color:var(--blue);text-decoration:none;background:var(--blue-soft);padding:8px 13px;border-radius:10px}
  .source:hover{background:#d6ecfb}
  .source.nolink{color:var(--ink-soft);background:#f1f5f9;pointer-events:none}

  /* actions */
  .actions{display:flex;gap:11px;padding:18px 24px 24px;flex-wrap:wrap}
  .btn{flex:1;min-width:140px;border:0;border-radius:13px;padding:14px 18px;font:inherit;
    font-weight:800;font-size:1rem;cursor:pointer;transition:all .16s ease}
  .btn.primary{color:#fff;background:linear-gradient(180deg,#1389d4,var(--blue));
    box-shadow:0 8px 20px rgba(15,126,199,.32)}
  .btn.primary:hover{background:var(--blue-d);transform:translateY(-1px);box-shadow:0 10px 24px rgba(15,126,199,.4)}
  .btn.ghost{color:var(--blue);background:#fff;border:1.6px solid #bcd9ee}
  .btn.ghost:hover{background:var(--blue-soft);transform:translateY(-1px)}
  .btn:disabled{opacity:.45;cursor:default;transform:none;box-shadow:none}

  .foot{text-align:center;color:#8194a8;font-size:.78rem;margin-top:22px;line-height:1.6}
  .foot kbd{font-family:"Space Grotesk",monospace;background:#fff;border:1px solid var(--line);
    border-bottom-width:2px;border-radius:6px;padding:1px 6px;font-size:.74rem;color:var(--ink-soft)}

  /* lightbox (放大看 ECG) */
  .lightbox{position:fixed;inset:0;z-index:80;display:none;background:rgba(8,15,26,.92);
    overflow:auto;padding:24px;cursor:zoom-out;text-align:center}
  .lightbox.open{display:block}
  .lightbox img{max-width:none;min-width:100%;height:auto;border-radius:8px;
    box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .lightbox-close{position:fixed;top:16px;right:18px;width:42px;height:42px;border:0;border-radius:50%;
    background:rgba(255,255,255,.18);color:#fff;font-size:1.5rem;line-height:1;cursor:pointer;z-index:81}
  .lightbox-close:hover{background:rgba(255,255,255,.32)}

  /* embedded (in popup modal) */
  html.is-embedded body{background:#f4f8fc}
  html.is-embedded .wrap{padding:18px 16px 30px}
  html.is-embedded .top{margin-bottom:14px}

  @media(max-width:560px){
    .wrap{padding:22px 14px 40px}
    .brand{font-size:1.15rem}
    .stem{font-size:1.07rem}
    .figure{height:200px}
    .btn{min-width:100%}
  }
</style>
</head>
<body>
<script>
  (function(){
    var p=new URLSearchParams(location.search);
    if(p.get("embed")==="1"||window.self!==window.top){document.documentElement.classList.add("is-embedded");}
  })();
</script>
<main class="wrap">
  <div class="top">
    <div class="brand">
      <svg class="pulse" viewBox="0 0 40 40" fill="none" aria-hidden="true">
        <rect width="40" height="40" rx="11" fill="#0f7ec7"/>
        <path d="M5 21h7l3-9 4 17 4-13 2.5 5H35" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      ECG 隨機考題 <span class="beta">BETA</span>
    </div>
    <div class="counter">已練習 <b id="doneCount">0</b> 題</div>
  </div>

  <section class="card" id="card" aria-live="polite">
    <div class="figure" id="figure"></div>
    <div class="body">
      <div class="tags" id="tags"></div>
      <h1 class="stem" id="stem">載入中…</h1>
      <ul class="options" id="options"></ul>
      <div class="reveal" id="reveal" hidden>
        <div class="ans"><span class="badge">解答</span><span id="ansText"></span></div>
        <p class="explain" id="explain"></p>
        <a class="source" id="source" target="_blank" rel="noopener"></a>
      </div>
    </div>
    <div class="actions">
      <button class="btn primary" id="revealBtn">看解答</button>
      <button class="btn ghost" id="nextBtn">下一題（隨機）</button>
    </div>
  </section>

  <p class="foot">
    教學練習用途・ECG 圖片版權屬原作者，僅供學習引用<br>
    快捷鍵：<kbd>1</kbd>–<kbd>4</kbd> 選答案・<kbd>Space</kbd> 看解答・<kbd>N</kbd> 下一題
  </p>
</main>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose" aria-label="關閉">×</button>
  <img id="lightboxImg" alt="ECG 放大檢視" referrerpolicy="no-referrer">
</div>

<script>
const SOURCES = {
  own:   {name:"自有個案", color:"#0f7ec7"},
  smith: {name:"Dr. Smith's ECG Blog", color:"#7c3aed"},
  litfl: {name:"LITFL", color:"#0d9488"},
  grauer:{name:"Ken Grauer (ECG Blog)", color:"#d97706"}
};

// 範例 ECG 佔位波形（非診斷用，正式題庫換成真實個案圖）
const TRACES = [
  "M0 130 H40 l6 -10 l4 20 l5 -55 l5 70 l5 -25 H120 l6 -10 l4 20 l5 -55 l5 70 l5 -25 H200 l6 -10 l4 20 l5 -55 l5 70 l5 -25 H280 l6 -10 l4 20 l5 -55 l5 70 l5 -25 H360",
  "M0 135 q10 0 14 0 l4 -8 l4 16 l5 -62 l5 78 l6 -24 q8 6 16 0 q10 -2 18 4 H120 l4 -8 l4 16 l5 -62 l5 78 l6 -24 q10 4 22 2 H230 l4 -8 l4 16 l5 -62 l5 78 l6 -24 H360",
  "M0 128 H30 l5 -6 l5 12 l5 -48 l5 64 l5 -22 q9 8 20 6 q12 -2 18 6 H150 l5 -6 l5 12 l5 -48 l5 64 l5 -22 H260 l5 -6 l5 12 l5 -48 l5 64 l5 -22 H360"
];

function placeholder(src, idx){
  const c = (SOURCES[src]||SOURCES.own).color;
  const trace = TRACES[idx % TRACES.length];
  return '<div class="ecg-paper"></div>'+
    '<svg class="ecg-trace" viewBox="0 0 360 200" preserveAspectRatio="none" aria-hidden="true">'+
    '<path d="'+trace+'" style="stroke:'+c+'"/></svg>'+
    '<span class="ph-tag">範例佔位圖</span>';
}

let BANK=[], cur=-1, done=0, picked=null, revealed=false;

const $=id=>document.getElementById(id);
const figure=$("figure"),tags=$("tags"),stem=$("stem"),optionsEl=$("options"),
      reveal=$("reveal"),ansText=$("ansText"),explainEl=$("explain"),sourceEl=$("source"),
      revealBtn=$("revealBtn"),nextBtn=$("nextBtn"),doneCount=$("doneCount");
const KEYS=["A","B","C","D","E","F"];

function srcChip(q){
  const s=SOURCES[q.source]||SOURCES.own;
  return '<span class="src-chip" style="background:'+s.color+'e8"><span class="dot"></span>'+s.name+'</span>';
}

function openLightbox(url){
  const lb=document.getElementById("lightbox");
  document.getElementById("lightboxImg").src=url;
  lb.classList.add("open"); document.body.style.overflow="hidden";
}
function closeLightbox(){
  const lb=document.getElementById("lightbox");
  lb.classList.remove("open"); document.getElementById("lightboxImg").src=""; document.body.style.overflow="";
}

function render(q,idx){
  picked=null; revealed=false;
  if(q.image){
    figure.className="figure has-img";
    figure.innerHTML='<img class="ecg-img" src="'+q.image+'" alt="ECG 12 導程" referrerpolicy="no-referrer">'+srcChip(q)+'<span class="zoom-hint">🔍 點圖放大</span>';
    const im=figure.querySelector(".ecg-img");
    im.addEventListener("click",()=>openLightbox(q.image));
  }else{
    figure.className="figure";
    figure.innerHTML=placeholder(q.source,idx)+srcChip(q);
  }
  tags.innerHTML = (q.tags||[]).map(t=>'<span class="tag">#'+t+'</span>').join("");
  stem.textContent = q.stem;
  optionsEl.innerHTML = q.options.map((o,i)=>
    '<button class="opt" data-i="'+i+'"><span class="key">'+KEYS[i]+'</span><span>'+o+'</span><span class="mark"></span></button>'
  ).join("");
  optionsEl.querySelectorAll(".opt").forEach(b=>b.addEventListener("click",()=>select(+b.dataset.i)));
  reveal.hidden=true; revealBtn.disabled=false; revealBtn.textContent="看解答";
  $("card").style.animation="none"; void $("card").offsetWidth; $("card").style.animation="";
}

function select(i){
  if(revealed) return;
  picked=i;
  optionsEl.querySelectorAll(".opt").forEach(b=>b.classList.toggle("sel",+b.dataset.i===i));
}

function doReveal(){
  if(revealed) return;
  const q=BANK[cur];
  revealed=true; done++; doneCount.textContent=done;
  optionsEl.querySelectorAll(".opt").forEach(b=>{
    const i=+b.dataset.i; b.disabled=true; b.classList.remove("sel");
    if(i===q.answer){b.classList.add("correct"); b.querySelector(".mark").textContent="✓";}
    else if(i===picked){b.classList.add("wrong"); b.querySelector(".mark").textContent="✗";}
  });
  ansText.textContent = KEYS[q.answer]+"．"+q.options[q.answer];
  explainEl.textContent = q.explain;
  const s=SOURCES[q.source]||SOURCES.own;
  if(q.sourceUrl){
    sourceEl.className="source"; sourceEl.href=q.sourceUrl;
    sourceEl.innerHTML="出處："+s.name+" ↗";
  }else{
    sourceEl.className="source nolink"; sourceEl.removeAttribute("href");
    sourceEl.innerHTML="出處："+s.name;
  }
  reveal.hidden=false; revealBtn.disabled=true; revealBtn.textContent="已揭曉";
}

function next(){
  if(BANK.length<2){cur=0;} else {
    let n; do{ n=Math.floor(Math.random()*BANK.length);}while(n===cur);
    cur=n;
  }
  render(BANK[cur],cur);
}

revealBtn.addEventListener("click",doReveal);
nextBtn.addEventListener("click",next);
document.getElementById("lightbox").addEventListener("click",closeLightbox);
document.getElementById("lightboxClose").addEventListener("click",closeLightbox);
document.addEventListener("keydown",e=>{
  const lbOpen=document.getElementById("lightbox").classList.contains("open");
  if(e.key==="Escape"){ if(lbOpen) closeLightbox(); return; }
  if(lbOpen) return;
  if(e.key>="1"&&e.key<="6"){const i=+e.key-1; if(BANK[cur]&&i<BANK[cur].options.length) select(i);}
  else if(e.code==="Space"){e.preventDefault(); revealed?next():doReveal();}
  else if(e.key==="n"||e.key==="N"){next();}
});

fetch("./quiz.json").then(r=>r.json()).then(d=>{
  BANK=d.questions||[];
  if(!BANK.length){stem.textContent="目前尚無題目。"; return;}
  next();
}).catch(()=>{stem.textContent="題庫載入失敗。";});
</script>
</body>
</html>
